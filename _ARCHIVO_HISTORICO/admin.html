<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control V6 - Flota SaaS</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --panel: #121212;
            --card: #1a1a1a;
            --neon-green: #39FF14;
            --neon-green-dim: rgba(57, 255, 20, 0.15);
            --red: #FF073A;
            --red-dim: rgba(255, 7, 58, 0.15);
            --gray: #333333;
            --text: #FFFFFF;
            --text-muted: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; }

        h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; }
        
        /* SCROLLBAR OSCURO */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-green); }

        /* ===== PANTALLA DE ACCESO MAESTRO ===== */
        #login-overlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 99999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .login-box {
            background: var(--panel); border: 1px solid var(--gray); padding: 40px;
            border-radius: 16px; width: 400px; text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .login-logo { font-size: 40px; color: var(--neon-green); margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--neon-green)); }
        
        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .input-group input { 
            width: 100%; padding: 14px; background: var(--bg); border: 1px solid var(--gray); 
            border-radius: 8px; color: var(--text); font-family: 'Inter', sans-serif; transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--neon-green); outline: none; box-shadow: 0 0 10px var(--neon-green-dim); }
        
        .btn {
            width: 100%; padding: 14px; background: var(--neon-green); color: #000;
            border: none; border-radius: 8px; font-weight: 700; font-family: 'Space Grotesk', sans-serif;
            font-size: 15px; cursor: pointer; transition: 0.2s; text-transform: uppercase;
        }
        .btn:hover { filter: brightness(1.2); transform: scale(1.01); }
        .btn-outline { background: transparent; border: 1px solid var(--neon-green); color: var(--neon-green); margin-top: 10px; }
        .btn-outline:hover { background: var(--neon-green-dim); }

        /* ===== SIDEBAR ===== */
        .sidebar { width: 260px; background: var(--panel); border-right: 1px solid var(--gray); display: flex; flex-direction: column; }
        .brand { padding: 30px 20px; font-size: 20px; font-weight: 700; border-bottom: 1px solid var(--gray); display: flex; align-items: center; gap: 12px; color: var(--neon-green); }
        .led { width: 8px; height: 8px; background: var(--neon-green); border-radius: 50%; box-shadow: 0 0 10px var(--neon-green); }
        
        .nav { padding: 20px 0; flex: 1; }
        .nav-item { 
            padding: 15px 20px; color: var(--text-muted); font-size: 13px; cursor: pointer;
            display: flex; align-items: center; gap: 10px; border-left: 3px solid transparent; transition: 0.2s;
        }
        .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.02); }
        .nav-item.active { color: var(--neon-green); border-left-color: var(--neon-green); background: var(--neon-green-dim); font-weight: 600; }

        /* ===== CONTENIDO PRINCIPAL ===== */
        .main { flex: 1; padding: 40px; overflow-y: auto; position: relative; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .header h1 { font-size: 28px; letter-spacing: -1px; }

        /* Vista Secciones */
        .view-section { display: none; }
        .view-section.active { display: block; }

        /* Grid */
        .fleet-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        
        .card { background: var(--card); border: 1px solid var(--gray); border-radius: 16px; padding: 25px; transition: 0.3s; }
        .card:hover { border-color: #555; }
        
        .status-badge { 
            padding: 4px 10px; border-radius: 20px; font-size: 9px; font-weight: 700; 
            text-transform: uppercase; border: 1px solid currentColor; display: flex; align-items: center; gap: 6px;
        }
        .status-badge.online { color: var(--neon-green); background: var(--neon-green-dim); }

        .metrics { background: #0a0a0a; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .metrics div p { font-size: 9px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
        .metrics div h4 { font-size: 11px; font-weight: 600; font-family: monospace; color: #fff; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }

        .fc-btn { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--gray); background: transparent; color: #fff; cursor: pointer; margin-bottom: 5px; font-size: 11px; font-weight: 600; }
        .fc-btn:hover { background: #fff; color: #000; }
        .kill-switch { border-color: var(--red); color: var(--red); }
        .kill-switch:hover { background: var(--red); color: #fff; }

        /* Global Stats */
        .global-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-box { background: var(--card); border: 1px solid var(--gray); padding: 25px; border-radius: 16px; border-top: 3px solid var(--neon-green); }
        .stat-value { font-size: 42px; font-family: 'Space Grotesk'; color: var(--neon-green); font-weight: 700; }
        .stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; margin-top: 5px; }

        /* Recovery Config */
        #manual-config { display: none; margin-top: 25px; padding-top: 20px; border-top: 1px solid var(--gray); text-align: left; }
    </style>
</head>
<body>

    <!-- PANTALLA DE ACCESO -->
    <div id="login-overlay">
        <div class="login-box">
            <div class="login-logo">⚡</div>
            <h2 style="margin-bottom: 10px;">CONTROL CENTRAL</h2>
            <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 30px;">Panel de Administración de Flota</p>
            
            <div class="input-group">
                <label>Usuario Maestro</label>
                <input type="text" id="in-user" placeholder="ezequiel">
            </div>
            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" id="in-pass" placeholder="••••">
            </div>
            
            <button class="btn" onclick="validateMasterLogin()">Entrar al Sistema</button>
            <p id="login-error" style="color: var(--red); font-size: 11px; margin-top: 15px; display: none;"></p>

            <div id="manual-config">
                <p style="color:var(--text-muted); font-size:11px; margin-bottom:15px; text-align: center;">🔧 CONFIGURACIÓN DEL TOKEN (RECUPEERACIÓN)</p>
                <div class="input-group"><label>Nuevo PAT Maestro</label><input type="password" id="manual-pat"></div>
                <div class="input-group"><label>Nuevo Base ID</label><input type="text" id="manual-base"></div>
                <button class="btn btn-outline" onclick="saveManualKeys()">Guardar y Reintentar</button>
            </div>
        </div>
    </div>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="brand"><div class="led"></div> MODO DIOS</div>
        <div class="nav">
            <div class="nav-item active" onclick="switchView('flota', this)">🖥️ Flota de Clientes</div>
            <div class="nav-item" onclick="switchView('saas', this)">📈 Ingresos SaaS</div>
        </div>
        <div class="nav" style="border-top: 1px solid var(--gray); flex: none;">
            <div class="nav-item" style="color: #444" onclick="logoutMaster()">🔒 Logout</div>
        </div>
    </aside>

    <main class="main">
        <section id="view-flota" class="view-section active">
            <div class="header">
                <h1>Monitor de Flota</h1>
                <div style="display: flex; gap: 15px; align-items: center;">
                    <span id="sync-status" style="font-size: 11px; color: var(--text-muted);">Pendiente...</span>
                    <button class="btn btn-outline" style="width: auto; padding: 10px 20px; margin-top:0;" onclick="loadFlota()">↻ Refrescar</button>
                </div>
            </div>
            <div id="fleet-container" class="fleet-grid"></div>
        </section>

        <section id="view-saas" class="view-section">
            <div class="header"><h1>Métricas SaaS</h1></div>
            <div class="global-stats">
                <div class="stat-box">
                    <div class="stat-value" id="total-mrr">0.00 €</div>
                    <div class="stat-label">Cuota Mensual Total</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="total-clientes">0</div>
                    <div class="stat-label">Clientes Activos</div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // MOTOR DE ACCESO V6 (BLINDADO)
        const DEFAULT_PAT = 'REPLACED_BY_GITHUB_PUSH_PROTECTION';
        const DEFAULT_BASE = 'appS76pMhbe366y5P';
        let MASTER_PAT = localStorage.getItem('MASTER_PAT');
        let MASTER_BASE = localStorage.getItem('MASTER_BASE');
        const TABLE_NAME = 'Empresarios';

        window.onload = () => {
            if (MASTER_PAT && MASTER_BASE) {
                document.getElementById('login-overlay').style.display = 'none';
                loadFlota();
            }
        };

        function validateMasterLogin() {
            const user = document.getElementById('in-user').value.trim().toLowerCase();
            const pass = document.getElementById('in-pass').value.trim();
            
            localStorage.clear(); // Limpieza total preventiva al loguearse para evitar basura de sesiones previas

            if (user === 'ezequiel' && pass === '1') {
                MASTER_PAT = DEFAULT_PAT;
                MASTER_BASE = DEFAULT_BASE;
                localStorage.setItem('MASTER_PAT', MASTER_PAT);
                localStorage.setItem('MASTER_BASE', MASTER_BASE);
                document.getElementById('login-overlay').style.display = 'none';
                loadFlota();
            } else {
                document.getElementById('login-error').textContent = 'Credenciales Incorrectas';
                document.getElementById('login-error').style.display = 'block';
            }
        }

        function saveManualKeys() {
            const pat = document.getElementById('manual-pat').value.trim();
            const base = document.getElementById('manual-base').value.trim();
            if(pat && base) {
                MASTER_PAT = pat;
                MASTER_BASE = base;
                localStorage.setItem('MASTER_PAT', pat);
                localStorage.setItem('MASTER_BASE', base);
                document.getElementById('login-overlay').style.display = 'none';
                loadFlota();
            }
        }

        async function loadFlota() {
            document.getElementById('sync-status').textContent = 'Conectando Airtable...';
            const url = `https://api.airtable.com/v0/${MASTER_BASE}/${TABLE_NAME}`;
            try {
                const response = await fetch(url, { headers: { 'Authorization': `Bearer ${MASTER_PAT}` } });
                if (!response.ok) {
                    const err = await response.json();
                    if(err.error.type === 'INVALID_PERMISSIONS_OR_MODEL_NOT_FOUND' || (err.error.message && err.error.message.includes('token'))) {
                        document.getElementById('login-overlay').style.display = 'flex';
                        document.getElementById('manual-config').style.display = 'block';
                        document.getElementById('login-error').textContent = 'Token Inválido. Usa el panel de recuperación debajo.';
                        document.getElementById('login-error').style.display = 'block';
                    }
                    throw new Error(err.error.message || 'Error en Airtable');
                }
                const data = await response.json();
                renderFlota(data.records);
                document.getElementById('sync-status').textContent = 'Sincronizado';
            } catch (e) {
                console.error("Master Error:", e.message);
            }
        }

        function renderFlota(records) {
            const container = document.getElementById('fleet-container');
            container.innerHTML = '';
            let total = 0;
            
            // FILTRADO: Solo mostramos registros con NOMBRE REAL
            const recordsValidos = records.filter(r => r.fields.Nombre_Empresa && r.fields.Nombre_Empresa.trim() !== '');
            
            recordsValidos.forEach(r => {
                const f = r.fields;
                total += (f.Cuota_Mensual || 0);
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; margin-bottom:15px; align-items:center;">
                        <h3 style="font-size:16px;">${f.Nombre_Empresa || 'Empresa'}</h3>
                        <div class="status-badge online"><div style="width:5px;height:5px;background:var(--neon-green);border-radius:50%"></div> ACTIVO</div>
                    </div>
                    <div class="metrics">
                        <div><p>Contacto</p><h4>${f.Email_Dueño || '-'}</h4></div>
                        <div><p>Cuota</p><h4>${(f.Cuota_Mensual || 0).toFixed(2)} €</h4></div>
                    </div>
                    <button class="fc-btn" onclick="alert('Shadow Mode - Inyectando credenciales...')">👁 Shadow (Espejo)</button>
                    <button class="fc-btn kill-switch" onclick="alert('Kill Switch Iniciado')">⏻ Kill Switch</button>
                `;
                container.appendChild(card);
            });
            document.getElementById('total-mrr').textContent = total.toFixed(2) + ' €';
            document.getElementById('total-clientes').textContent = records.length;
        }

        function switchView(id, el) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            el.classList.add('active');
        }

        function logoutMaster() {
            localStorage.clear();
            window.location.reload();
        }
    </script>
</body>
</html>
